name: Terraform Tests

on:
  workflow_call:

    inputs:
      terraform-version:
        default: "v1.14.7"
        description: "The version of terraform to use"
        required: false
        type: string

permissions:
  contents: read

jobs:
  discover:
    name: Discover test directories
    runs-on: static_ip_runner
    outputs:
      directories: ${{ steps.find.outputs.directories }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Find directories with tests
        id: find
        run: |
          dirs=$(find terraform -name '*.tftest.hcl' -not -path '*/.terraform/*' -exec dirname {} \; | sed 's|/tests$||' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "directories=$dirs" >> "$GITHUB_OUTPUT"

  test:
    name: Test (${{ matrix.directory }})
    needs: discover
    if: needs.discover.outputs.directories != '[]'
    runs-on: static_ip_runner
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJson(needs.discover.outputs.directories) }}

    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Test
        run: terraform test
