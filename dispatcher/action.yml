name: 'Dispatcher'
description: 'This action provides a standardised way of invoking a repository_dispatch event in a destination_repository.'
inputs:
  token:
    description: 'GitHub token; Note: needs write permission for Contents on destination_repository (otherwise dispatch pattern will not work).'
    required: true
  changed_files:
    description: 'Comma-separated list of modified files.'
    required: false
  action_type:
    description: 'The PR state (opened, sync, or closed).'
    required: true
  is_merged:
    description: 'If the PR is merged `true` otherwise `false`.'
    required: true
  pr_number:
    description: 'The originating Pull Request ID.'
    required: true
  correlation_id:
    description: 'The unique GitHub run ID for end-to-end tracing.'
    required: true
  ref_name:
    description: 'A reference for this Pull Request (pr_number/action_type).'
    required: true
  pull_request_sha:
    description: 'The Pull Requests SHA value.'
    required: true
  source_repository:
    description: 'The source repository that initiated the Pull Request.'
    required: true
  destination_repository:
    description: 'The target GitHub repo that will receive the client payload.'
    required: true

runs:
  using: 'composite'
  steps:
    - shell: bash
      run: |
        # Build JSON payload
        PAYLOAD=$(cat <<EOF
        {
          "event_type": "receiver-trigger",
          "client_payload": {
            "action_type": "${{ inputs.action_type }}",
            "is_merged": "${{ inputs.is_merged }}",
            "changed_files": "${{ inputs.changed_files }}",
            "pr_number": "${{ inputs.pr_number }}",
            "correlation_id": "${{ inputs.correlation_id }}",
            "ref_name": "${{ inputs.ref_name }}",
            "pull_request_sha": "${{ inputs.pull_request_sha }}",
            "source_repository": "${{ inputs.source_repository }}"
          }
        }
        EOF
        )

        # Debug output
        echo "Dispatching to: ${{ inputs.destination_repository }}"
        echo "Payload: $PAYLOAD"

        # Send dispatch request
        RESPONSE=$(curl -s -w "%{http_code}" -o /tmp/response.json \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ inputs.token }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${{ inputs.destination_repository }}/dispatches" \
          -d "$PAYLOAD")

        # Check response
        if [ "$RESPONSE" = "204" ]; then
          echo "Successfully dispatched to ${{ inputs.destination_repository }}"
        else
          echo "Failed to dispatch. HTTP Status: $RESPONSE"
          cat /tmp/response.json
          exit 1
        fi
