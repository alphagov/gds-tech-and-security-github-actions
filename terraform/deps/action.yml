name: Terraform validate
description: Perform terraform checks

inputs:
  terraform-version:
    description: 'Terraform version to use'
    required: false
    type: string
    default: 'latest'
  terraform-docs-version:
    description: 'Terraform-docs version to use'
    required: false
    type: string
    default: 'v0.21.0'
  terraform-docs-sha256:
    description: 'Terraform-docs sha256 checksum to verify'
    required: false
    type: string
    default: |
      2fdd81b8d21ff1498cd559af0dcc5d155835f84600db06d3923e217124fc735a
      35b2e6846268841484e6eea7d00d7dfe2c94b4725e52cfe19aa6c26a86c32edc
  tflint-version:
    description: 'TFLint version to use'
    required: false
    type: string
    default: 'v0.61.0'
  tflint-sha256:
    description: 'TFLint sha256 checksum to verify'
    required: false
    type: string
    default: |
      ca4e4e8cb7cc3436f2b6979e9c4fd4e2623a66fcca1ad1fe12f8669967636ae2
      999c25cfdb5208fe1133dec6b219e666a39fc2a7a0786a781dc9924ea5945ebf
  trivy-version:
    description: 'Trivy version to use'
    required: false
    type: string
    default: 'latest'
  checkov-version:
    description: 'Checkov version to use'
    required: false
    type: string
    default: 'latest'

runs:
  using: composite
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@4cb9feea73331a35b422df102992a03a44a3bb33 # v6.2.1
      with:
        tflint_version: ${{ inputs.tflint-version }}
        checksums: ${{ inputs.tflint-sha256 }}

    - name: Setup Trivy
      uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6 - see dependabot.yml ignore rule
      with:
        version: ${{ inputs.trivy-version }}

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.x'

    - name: Install Checkov
      shell: bash
      run: |
        echo "Install Checkov"
        package_spec="checkov"
        [ "${{ inputs.checkov-version }}" != "latest" ] && package_spec+="==${{ inputs.checkov-version }}"
        pip install \
          -q \
          "$package_spec"

    - name: Install terraform-docs
      shell: bash --noprofile --norc -euo pipefail {0}
      working-directory: ${{ runner.temp }}
      run: |
        echo "Install terraform-docs"

        version="${{ inputs.terraform-docs-version }}"
        checksums="${{ inputs.terraform-docs-sha256 }}"

        arch_type="$(uname -m)"
        case "$arch_type" in
          x86_64)        arch="amd64" ;;
          aarch64|arm64) arch="arm64" ;;
          *)             echo "Unsupported architecture: $arch_type" >&2; exit 1 ;;
        esac

        tarball="terraform-docs-${version}-linux-${arch}.tar.gz"

        echo "Downloading terraform-docs ${version} for linux ${arch}"
        curl -sSLo "$tarball" \
          "https://github.com/terraform-docs/terraform-docs/releases/download/${version}/${tarball}"

        # Normalize checksums list to one hash per line.
        echo "${checksums}" | tr ' \t' '\n' | sed '/^$/d' > checksums.list

        # Compute actual checksum of the tarball.
        echo "Computing checksum for $tarball"
        tarball_checksum="$(shasum -a 256 "$tarball" | awk '{print $1}')"

        # Check against all provided checksums
        match="false"
        while read -r expected_checksum; do
          if [ "$tarball_checksum" = "$expected_checksum" ]; then
            match="true"
            break
          fi
        done < checksums.list

        if [ "$match" != "true" ]; then
          echo "Checksum verification failed for $tarball" >&2
          echo "Expected one of:" >&2
          cat checksums.list >&2
          exit 1
        fi

        echo "Checksum verified successfully"

        tar -xzf "$tarball"
        chmod +x terraform-docs
        mv terraform-docs /usr/local/bin/terraform-docs
