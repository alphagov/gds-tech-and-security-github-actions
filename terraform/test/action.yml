name: Terraform test
description: Discover and run Terraform tests

inputs:
  terraform-version:
    description: "The version of terraform to use"
    required: false
    default: "v1.14.7"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Find and run Terraform tests
      shell: bash
      run: |
        dirs=$(find terraform -name '*.tftest.hcl' -not -path '*/.terraform/*' -exec dirname {} \; | sed 's|/tests$||' | sort -u)

        if [ -z "$dirs" ]; then
          echo "No test directories found"
          exit 0
        fi

        failed=0
        for dir in $dirs; do
          echo "::group::Test ($dir)"
          echo "Running terraform test in $dir"
          terraform -chdir="$dir" init -backend=false
          if ! terraform -chdir="$dir" test; then
            failed=1
          fi
          echo "::endgroup::"
        done

        if [ "$failed" -ne 0 ]; then
          echo "::error::One or more Terraform tests failed"
          exit 1
        fi
